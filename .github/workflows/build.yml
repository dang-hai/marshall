name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_call:
    inputs:
      tag_name:
        description: 'Tag name for the release'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      release:
        description: 'Create a release'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run database migrations
        run: bun run db:migrate
        working-directory: packages/database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build packages
        run: bun run typecheck

      - name: Build application
        run: bun run build
        working-directory: apps/desktop
        env:
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}

      - name: Build NotchCompanion (Swift)
        run: ./build.sh
        working-directory: apps/notch-companion

      - name: Import Code Signing Certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          echo "$CERTIFICATE_BASE64" | base64 --decode > $CERTIFICATE_PATH

          security import $CERTIFICATE_PATH -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Package and Sign
        env:
          # Code signing
          CSC_LINK: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # Notarization
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Auto-updater (generates latest-mac.yml)
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bun run package -- \
            --mac \
            --arm64 --x64 \
            --config.mac.notarize.teamId="$APPLE_TEAM_ID" \
            --publish always
        working-directory: apps/desktop

      - name: Smoke test packaged app
        run: |
          # Find the built app (use arm64 on Apple Silicon runners)
          APP_PATH="apps/desktop/dist/mac-arm64/Marshall.app"
          if [ ! -d "$APP_PATH" ]; then
            APP_PATH="apps/desktop/dist/mac/Marshall.app"
          fi

          echo "Testing app at: $APP_PATH"

          # Run app with timeout, capture stderr for module errors
          # The app will fail to fully start (no display), but module loading happens first
          STDERR_FILE=$(mktemp)
          timeout 10s "$APP_PATH/Contents/MacOS/Marshall" 2>"$STDERR_FILE" || true

          # Check for module resolution errors
          if grep -q "Cannot find module" "$STDERR_FILE"; then
            echo "::error::App failed to start due to missing module:"
            cat "$STDERR_FILE"
            exit 1
          fi

          echo "Smoke test passed - no module resolution errors"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Marshall-macOS
          path: |
            apps/desktop/dist/*.dmg
            apps/desktop/dist/*.zip
            apps/desktop/dist/latest-mac.yml
          if-no-files-found: error

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.release == 'true' || inputs.tag_name != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          files: |
            apps/desktop/dist/*.dmg
            apps/desktop/dist/*.zip
            apps/desktop/dist/latest-mac.yml
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
