name: Neon Preview Branches

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency:
  group: neon-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  manage-preview-branch:
    if: |
      github.event.pull_request.head.repo.full_name == github.repository &&
      !startsWith(github.event.pull_request.head.ref, 'release-please--')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GIT_BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Compute Neon branch name
        run: |
          node --input-type=module <<'EOF' >> "$GITHUB_ENV"
          import { toNeonPreviewBranchName } from "./scripts/neon-branch-utils.mjs";

          console.log(`NEON_BRANCH_NAME=${toNeonPreviewBranchName(process.env.GIT_BRANCH_NAME)}`);
          EOF

      - name: Create Neon preview branch
        if: github.event.action != 'closed'
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: ${{ env.NEON_BRANCH_NAME }}
          parent_branch: ${{ github.event.pull_request.base.ref }}
          database: marshall
          role: marshall_owner
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Delete Neon preview branch
        if: github.event.action == 'closed'
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: ${{ env.NEON_BRANCH_NAME }}
          api_key: ${{ secrets.NEON_API_KEY }}
