name: Release Please

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  deploy-server:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    env:
      RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
      RAILWAY_PROD_ENV_ID: ${{ vars.RAILWAY_PROD_ENV_ID }}
      RAILWAY_BACKEND_SERVICE_ID: ${{ vars.RAILWAY_BACKEND_SERVICE_ID }}
    steps:
      - name: Wait for CI
        run: gh run watch --repo ${{ github.repository }} --exit-status $(gh run list --repo ${{ github.repository }} --workflow CI --branch main --limit 1 --json databaseId --jq '.[0].databaseId')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to Railway
        run: |
          echo "Triggering Railway deployment..."
          curl -s --request POST \
            --url https://backboard.railway.com/graphql/v2 \
            --header "Authorization: Bearer $RAILWAY_API_TOKEN" \
            --header 'Content-Type: application/json' \
            --data "{
              \"query\": \"mutation { serviceInstanceDeploy(serviceId: \\\"$RAILWAY_BACKEND_SERVICE_ID\\\", environmentId: \\\"$RAILWAY_PROD_ENV_ID\\\") }\"
            }"
          echo "✓ Railway deployment triggered"

  deploy-marketing:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI
        run: gh run watch --repo ${{ github.repository }} --exit-status $(gh run list --repo ${{ github.repository }} --workflow CI --branch main --limit 1 --json databaseId --jq '.[0].databaseId')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build marketing
        run: bun run --filter @marshall/marketing build

      - name: Deploy to Vercel
        run: |
          cd apps/marketing
          bunx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          bunx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          bunx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  build-electron:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: ./.github/workflows/build.yml
    with:
      tag_name: ${{ needs.release-please.outputs.tag_name }}
    secrets: inherit
