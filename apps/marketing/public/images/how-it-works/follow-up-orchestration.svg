<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- macOS Sonoma-style background -->
  <rect width="1600" height="1000" rx="52" fill="url(#sonoma-base-5)"/>

  <!-- Organic flowing shapes -->
  <ellipse cx="1400" cy="200" rx="500" ry="380" fill="url(#blob-rose)" opacity="0.65"/>
  <ellipse cx="100" cy="700" rx="550" ry="400" fill="url(#blob-indigo)" opacity="0.55"/>
  <ellipse cx="800" cy="600" rx="650" ry="300" fill="url(#blob-violet)" opacity="0.4"/>
  <ellipse cx="400" cy="150" rx="400" ry="280" fill="url(#blob-fuchsia)" opacity="0.5"/>

  <!-- Inner frame -->
  <rect x="56" y="56" width="1488" height="888" rx="42" fill="rgba(255,255,255,0.08)"/>
  <rect x="56" y="56" width="1488" height="888" rx="42" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <!-- Main panel -->
  <rect x="156" y="154" width="1288" height="692" rx="20" fill="rgba(255,255,255,0.93)" filter="url(#main-shadow-5)"/>
  <rect x="156" y="154" width="1288" height="692" rx="20" stroke="rgba(255,255,255,0.6)" stroke-width="0.5"/>

  <text x="214" y="218" fill="#FF2D55" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="13" font-weight="600" letter-spacing="0.8">FOLLOW-UP ORCHESTRATION</text>
  <text x="214" y="274" fill="#1d1d1f" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="38" font-weight="700" letter-spacing="-0.02em">Turn loose ends into the next step.</text>

  <!-- Calendar invite card -->
  <rect x="214" y="334" width="500" height="420" rx="16" fill="rgba(0,122,255,0.06)"/>

  <!-- Calendar icon -->
  <rect x="250" y="370" width="44" height="44" rx="10" fill="#007AFF"/>
  <rect x="254" y="378" width="36" height="28" rx="4" fill="#ffffff"/>
  <rect x="260" y="370" width="8" height="8" rx="2" fill="#ffffff"/>
  <rect x="276" y="370" width="8" height="8" rx="2" fill="#ffffff"/>

  <text x="308" y="400" fill="#007AFF" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="12" font-weight="600" letter-spacing="0.6">DRAFT CALENDAR INVITE</text>

  <text x="250" y="460" fill="#1d1d1f" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="24" font-weight="700" letter-spacing="-0.01em">Security review follow-up</text>
  <text x="250" y="496" fill="#6e6e73" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="16">Thursday, 2:00 PM - 2:30 PM</text>

  <!-- Event details -->
  <rect x="250" y="536" width="420" height="52" rx="12" fill="rgba(255,255,255,0.95)" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>
  <circle cx="280" cy="562" r="6" fill="#5856D6"/>
  <text x="300" y="568" fill="#1d1d1f" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="15">Attendees: IT, Legal, Customer Ops</text>

  <rect x="250" y="604" width="420" height="52" rx="12" fill="rgba(255,255,255,0.95)" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>
  <circle cx="280" cy="630" r="6" fill="#34C759"/>
  <text x="300" y="636" fill="#1d1d1f" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="15">Agenda: unblock security sign-off</text>

  <rect x="250" y="672" width="420" height="52" rx="12" fill="rgba(255,255,255,0.95)" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>
  <circle cx="280" cy="698" r="6" fill="#FF9500"/>
  <text x="300" y="704" fill="#1d1d1f" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="15">Owner: Alicia Chen</text>

  <!-- Stakeholders card (dark) -->
  <rect x="764" y="334" width="520" height="420" rx="16" fill="#1d1d1f"/>

  <rect x="800" y="370" width="44" height="44" rx="10" fill="rgba(255,255,255,0.12)"/>
  <text x="810" y="400" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="20" font-weight="700">+</text>
  <text x="858" y="400" fill="rgba(255,255,255,0.6)" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="12" font-weight="600" letter-spacing="0.6">WHO ELSE SHOULD SEE THIS</text>

  <text x="800" y="460" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="24" font-weight="700" letter-spacing="-0.01em">Recommended stakeholders</text>

  <!-- Stakeholder pills -->
  <rect x="800" y="500" width="440" height="56" rx="12" fill="rgba(255,255,255,0.08)"/>
  <circle cx="836" cy="528" r="16" fill="#FF2D55"/>
  <text x="833" y="534" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="13" font-weight="600">N</text>
  <text x="866" y="534" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="16">Nina Shah - renewal sponsor</text>

  <rect x="800" y="572" width="440" height="56" rx="12" fill="rgba(255,255,255,0.08)"/>
  <circle cx="836" cy="600" r="16" fill="#5856D6"/>
  <text x="833" y="606" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="13" font-weight="600">A</text>
  <text x="866" y="606" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="16">Andrew Lee - legal reviewer</text>

  <rect x="800" y="644" width="440" height="56" rx="12" fill="rgba(255,255,255,0.08)"/>
  <circle cx="836" cy="672" r="16" fill="#34C759"/>
  <text x="829" y="678" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="13" font-weight="600">CS</text>
  <text x="866" y="678" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="16">CS leadership - needs the recap</text>

  <!-- Add all button -->
  <rect x="800" y="720" width="160" height="44" rx="22" fill="#FF2D55"/>
  <text x="845" y="748" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="14" font-weight="600">Add all</text>

  <defs>
    <linearGradient id="sonoma-base-5" x1="0" y1="0" x2="1600" y2="1000" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1a0a2e"/>
      <stop offset="0.35" stop-color="#2e1065"/>
      <stop offset="0.65" stop-color="#4c1d95"/>
      <stop offset="1" stop-color="#1a0a2e"/>
    </linearGradient>

    <radialGradient id="blob-rose" cx="0.4" cy="0.4" r="0.8">
      <stop offset="0" stop-color="#ff6b6b"/>
      <stop offset="0.5" stop-color="#ee5a5a"/>
      <stop offset="1" stop-color="#c44569" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="blob-indigo" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0" stop-color="#667eea"/>
      <stop offset="0.4" stop-color="#764ba2"/>
      <stop offset="1" stop-color="#6b21a8" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="blob-violet" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0" stop-color="#c084fc"/>
      <stop offset="0.5" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#9333ea" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="blob-fuchsia" cx="0.4" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#f0abfc"/>
      <stop offset="0.6" stop-color="#e879f9"/>
      <stop offset="1" stop-color="#d946ef" stop-opacity="0"/>
    </radialGradient>

    <filter id="main-shadow-5" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="32" flood-color="rgba(0,0,0,0.35)"/>
    </filter>
  </defs>
</svg>
